<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calculator">
    <div class="display" id="display">0</div>
    <div class="keys">
      <button class="key key-action" data-action="clear">C</button>
      <button class="key key-action" data-action="sign">+/-</button>
      <button class="key key-action" data-action="percent">%</button>
      <button class="key key-op" data-op="/">÷</button>

      <button class="key" data-digit="7">7</button>
      <button class="key" data-digit="8">8</button>
      <button class="key" data-digit="9">9</button>
      <button class="key key-op" data-op="*">×</button>

      <button class="key" data-digit="4">4</button>
      <button class="key" data-digit="5">5</button>
      <button class="key" data-digit="6">6</button>
      <button class="key key-op" data-op="-">−</button>

      <button class="key" data-digit="1">1</button>
      <button class="key" data-digit="2">2</button>
      <button class="key" data-digit="3">3</button>
      <button class="key key-op" data-op="+">+</button>

      <button class="key key-zero" data-digit="0">0</button>
      <button class="key" data-action="decimal">.</button>
      <button class="key key-equals" data-action="equals">=</button>
    </div>
    <section class="history" id="history" aria-label="Calculation history">
      <header class="history-header">
        <span>History</span>
        <button class="history-clear" id="historyClear" type="button">Clear</button>
      </header>
      <ul class="history-list" id="historyList"></ul>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
